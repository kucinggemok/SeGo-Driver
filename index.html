<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeGo | Driver Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; --amber: #fbbc04; }
        body { font-family: sans-serif; background: var(--bg); color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        .btn { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #1e293b; border-radius: 10px; cursor: pointer; border: 1px solid #334155; }
        .tab.active { background: var(--blue); }
    </style>
</head>
<body>
    <div class="container">
        <h2>Driver Dashboard</h2>
        <div class="tab-bar">
            <div class="tab active" id="t1" onclick="switchTab('live')">Live Request</div>
            <div class="tab" id="t2" onclick="switchTab('board')">Booking Board</div>
        </div>
        <div id="live">
            <div class="card">
                <h3>My Status</h3>
                <button id="statusBtn" class="btn" onclick="toggleStatus()">GO ONLINE</button>
            </div>
        </div>
        <div id="board" style="display:none">
            <h3>Student Bookings</h3>
            <div id="bookingList"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCU3QzjiDpL4U3825XtERth6PFlJ1tsZtg",
            databaseURL: "https://carpool-uitm-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "carpool-uitm"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const MY_ID = "shauqi"; // Make sure this matches your Firebase key!

        function switchTab(t) {
            document.getElementById('live').style.display = t==='live'?'block':'none';
            document.getElementById('board').style.display = t==='board'?'block':'none';
            document.getElementById('t1').className = t==='live'?'tab active':'tab';
            document.getElementById('t2').className = t==='board'?'tab active':'tab';
        }

        db.ref('drivers/'+MY_ID).on('value', s => {
            const d = s.val();
            const b = document.getElementById('statusBtn');
            if(d.status === "ON") { b.innerText = "GO OFFLINE"; b.style.background = "#ef4444"; }
            else { b.innerText = "GO ONLINE"; b.style.background = "#22c55e"; }
        });

        async function toggleStatus() {
            const s = await db.ref('drivers/'+MY_ID+'/status').once('value');
            await db.ref('drivers/'+MY_ID).update({status: s.val()==="ON"?"OFF":"ON"});
        }

        db.ref('bookings').on('value', snap => {
            let h = "";
            snap.forEach(c => {
                const b = c.val();
                if(b.status === "PENDING") {
                    h += `<div class="card"><b>${b.student_name}</b><br>${b.date} @ ${b.time}<br><button class="btn" style="background:var(--amber);color:black" onclick="accept('${c.key}')">ACCEPT</button></div>`;
                }
            });
            document.getElementById('bookingList').innerHTML = h || "No requests.";
        });

        async function accept(key) { await db.ref('bookings/'+key).update({status:'ACCEPTED', driver_name:MY_ID}); alert("Accepted!"); }
    </script>
</body>
</html>
