<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeGo | Driver Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; --amber: #fbbc04; --red: #ef4444; --green: #22c55e; --slate: #94a3b8; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; }
        
        /* Interface Login Kau */
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: var(--blue); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
        
        /* Status UI */
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px; width: 100%; box-sizing: border-box;}
        .badge { padding: 5px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; }
        .online { background: var(--green); }
        .offline { background: var(--red); }

        /* Chat Panel */
        #chatPanel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 5000; display: none; flex-direction: column; }
        .bubble { padding: 10px 15px; border-radius: 15px; max-width: 75%; margin: 5px 0; }
        .bubble.me { align-self: flex-end; background: var(--blue); }
        .bubble.them { align-self: flex-start; background: #334155; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loginArea">
            <h1 style="text-align: center;">🚕 SeGo Driver</h1>
            <div class="card">
                <input type="text" id="drvID" class="input-field" placeholder="Student ID (Driver)">
                <input type="text" id="drvName" class="input-field" placeholder="Full Name">
                <input type="text" id="drvCar" class="input-field" placeholder="Car Model (e.g. Axia)">
                <input type="text" id="drvPlate" class="input-field" placeholder="Plate Number (e.g. ABC 1234)">
                <button class="btn" onclick="login()">Start Driving</button>
            </div>
        </div>

        <div id="mainApp" style="display: none;">
            <div class="status-bar">
                <span>Driver: <b id="displayDrvName"></b></span>
                <span id="statusLabel" class="badge offline">OFFLINE</span>
            </div>
            
            <button id="toggleBtn" class="btn" style="background: var(--green); margin-bottom: 20px;" onclick="toggleStatus()">GO ONLINE</button>

            <div id="requestListArea">
                <h3 id="listTitle">Available Requests</h3>
                <div id="requestList">Waiting for incoming requests...</div>
            </div>

            <div id="activeTripArea" style="display:none;"></div>
            
            <button onclick="logout()" style="margin-top:30px; background:none; border:none; color:var(--red); cursor:pointer; width:100%;">Logout</button>
        </div>
    </div>

    <div id="chatPanel">
        <div style="background: var(--blue); padding: 20px; display: flex; align-items: center;">
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:1.2rem;">←</button>
            <b style="margin-left:15px;" id="chatWith">Student</b>
        </div>
        <div id="chatMessages" style="flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column;"></div>
        <div style="padding:15px; display:flex; gap:10px;">
            <input type="text" id="chatInput" class="input-field" style="margin:0"><button class="btn" style="width:80px" onclick="sendMsg()">Send</button>
        </div>
    </div>

    <script>
        // Firebase Config (Guna kau punya)
        const firebaseConfig = { 
            apiKey: "AIzaSyCU3QzjiDpL4U3825XtERth6PFlJ1tsZtg", 
            databaseURL: "https://carpool-uitm-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "carpool-uitm" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = JSON.parse(localStorage.getItem('sego_driver'));
        let isOnline = false;
        let currentRideId = null;

        function login() {
            const id = document.getElementById('drvID').value.trim();
            const name = document.getElementById('drvName').value.trim();
            const car = document.getElementById('drvCar').value.trim();
            const plate = document.getElementById('drvPlate').value.trim();
            if(!id || !name || !car || !plate) return alert("Please fill all details!");
            currentUser = { id, name, car, plate };
            localStorage.setItem('sego_driver', JSON.stringify(currentUser));
            location.reload();
        }

        function logout() { 
            if(currentUser) db.ref('drivers/' + currentUser.id).remove();
            localStorage.clear(); 
            location.reload(); 
        }

        if(currentUser) {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('displayDrvName').innerText = currentUser.name;
            initDriver();
        }

        async function initDriver() {
            // 1. Monitor status online/offline driver
            db.ref('drivers/' + currentUser.id).on('value', snap => {
                const data = snap.val();
                if(data && (data.status === "ON" || data.status === "BUSY")) {
                    isOnline = true;
                    updateUIStatus(data.status);
                    if(data.status === "ON") listenForRequests();
                } else {
                    isOnline = false;
                    updateUIStatus("OFFLINE");
                    document.getElementById('requestList').innerHTML = "Go online to see requests.";
                }
            });

            // 2. Monitor jika ada trip yang ACTIVE (ACCEPTED)
            db.ref('open_requests').on('value', snap => {
                let foundActive = false;
                snap.forEach(child => {
                    const req = child.val();
                    if(req.driver_id === currentUser.id && req.status === 'ACCEPTED') {
                        foundActive = true;
                        showActiveTrip(child.key, req);
                    }
                });
                if(!foundActive) {
                    document.getElementById('activeTripArea').style.display = 'none';
                    document.getElementById('requestListArea').style.display = 'block';
                }
            });
        }

        function updateUIStatus(status) {
            const label = document.getElementById('statusLabel');
            const btn = document.getElementById('toggleBtn');
            if(status === "ON" || status === "BUSY") {
                label.innerText = status; label.className = "badge online";
                btn.innerText = "GO OFFLINE"; btn.style.background = "var(--red)";
            } else {
                label.innerText = "OFFLINE"; label.className = "badge offline";
                btn.innerText = "GO ONLINE"; btn.style.background = "var(--green)";
            }
        }

        async function toggleStatus() {
            if(!isOnline) {
                await db.ref('drivers/' + currentUser.id).set({ ...currentUser, status: 'ON', rating: '5.0' });
            } else {
                await db.ref('drivers/' + currentUser.id).remove();
            }
        }

        function listenForRequests() {
            db.ref('open_requests').on('value', snap => {
                let html = "";
                snap.forEach(child => {
                    const req = child.val();
                    if(req.status === 'SEARCHING') {
                        html += `
                        <div class="card">
                            <div style="font-size:0.7rem; color:var(--amber); font-weight:bold;">NEW REQUEST [${req.pax} PAX]</div>
                            <b style="font-size:1.1rem;">${req.student_name}</b><br>
                            <div style="margin-top:8px; font-size:0.9rem;">
                                📍 <b>From:</b> ${req.pickup}<br>
                                🎯 <b>To:</b> ${req.destination}
                            </div>
                            <button class="btn" style="margin-top:12px; background:var(--green)" onclick="acceptRide('${child.key}')">ACCEPT RIDE</button>
                        </div>`;
                    }
                });
                document.getElementById('requestList').innerHTML = html || "Waiting for students...";
            });
        }

        async function acceptRide(reqId) {
            await db.ref('open_requests/' + reqId).update({
                status: 'ACCEPTED',
                driver_id: currentUser.id,
                driver_name: currentUser.name,
                driver_car: currentUser.car,
                driver_plate: currentUser.plate
            });
            await db.ref('drivers/' + currentUser.id).update({ status: 'BUSY' });
        }

        function showActiveTrip(reqId, data) {
            currentRideId = reqId;
            document.getElementById('requestListArea').style.display = 'none';
            const area = document.getElementById('activeTripArea');
            area.style.display = 'block';
            area.innerHTML = `
                <div class="card" style="border-top:5px solid var(--amber)">
                    <h4>Ongoing Trip</h4>
                    <p>Passenger: <b>${data.student_name}</b></p>
                    <p>Route: ${data.pickup} ➔ ${data.destination}</p>
                    <button class="btn" onclick="openChat('${reqId}', '${data.student_name}')">CHAT STUDENT</button>
                    <button class="btn" style="background:var(--amber); color:black; margin-top:10px;" onclick="finishRide('${reqId}')">FINISH RIDE</button>
                </div>`;
        }

        async function finishRide(reqId) {
            if(confirm("Finish this trip? Student will be asked for rating.")) {
                // Inform student trip is done
                await db.ref('open_requests/' + reqId).update({ status: 'COMPLETED' });
                // Reset driver to ON
                await db.ref('drivers/' + currentUser.id).update({ status: 'ON' });
                // Clean chat
                await db.ref('chats/' + reqId).remove();
                alert("Trip Finished!");
            }
        }

        // CHAT LOGIC
        function openChat(id, name) {
            document.getElementById('chatWith').innerText = name;
            document.getElementById('chatPanel').style.display = 'flex';
            db.ref('chats/'+id).on('value', snap => {
                let h = "";
                snap.forEach(m => {
                    const msg = m.val();
                    h += `<div class="bubble ${msg.sender === 'driver' ? 'me' : 'them'}">${msg.text}</div>`;
                });
                const box = document.getElementById('chatMessages');
                box.innerHTML = h; box.scrollTop = box.scrollHeight;
            });
        }
        function closeChat() { document.getElementById('chatPanel').style.display = 'none'; }
        function sendMsg() {
            const i = document.getElementById('chatInput');
            if(!i.value.trim()) return;
            db.ref('chats/' + currentRideId).push({ sender: 'driver', text: i.value });
            i.value = "";
        }
    </script>
</body>
</html>
