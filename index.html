<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard | SeGo Driver</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; --green: #22c55e; --red: #ef4444; --amber: #f59e0b; --slate: #94a3b8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 15px; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        
        #statusBadge { padding: 10px; border-radius: 10px; text-align: center; font-weight: bold; margin-bottom: 15px; }
        .status-ON { background: var(--green); color: white; }
        .status-OFF { background: var(--red); color: white; }
        .status-BOOKED { background: var(--amber); color: black; }

        .request-card { background: #0f172a; padding: 15px; border-radius: 15px; border: 1px solid var(--blue); margin-top: 10px; }
        .pax-tag { background: var(--blue); padding: 2px 8px; border-radius: 5px; font-size: 0.7rem; float: right; }
        
        #chatBox { background: #0f172a; height: 200px; overflow-y: auto; padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px solid #334155; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 0.9rem; }
        .me { align-self: flex-end; background: var(--blue); }
        .them { align-self: flex-start; background: #334155; }

        .tab-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 10px; cursor: pointer; }
        .tab-btn.active { background: var(--blue); font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginArea" class="card">
            <h2 style="text-align:center;">SeGo Driver</h2>
            <input type="text" id="uName" placeholder="Username">
            <input type="password" id="uPass" placeholder="Password">
            <button class="btn" style="background: var(--blue); color:white;" onclick="login()">Login</button>
        </div>

        <div id="dashArea" style="display:none;">
            <div class="card">
                <div id="statusBadge">OFFLINE</div>
                <h2 id="dispName" style="margin:0;">-</h2>
                <p id="dispCar" style="color:var(--slate); margin: 5px 0 15px 0;">-</p>

                <div class="tab-bar">
                    <button class="tab-btn active" id="btnLive" onclick="showTab('live')">Instant Jobs</button>
                    <button class="tab-btn" id="btnBoard" onclick="showTab('board')">Schedule</button>
                </div>

                <div id="sectionLive">
                    <div id="availableRequests">
                        <h4 style="color:var(--blue); margin-bottom:10px;">🔔 New Requests</h4>
                        <div id="requestList" style="font-size: 0.9rem;">Go Online to see requests...</div>
                    </div>

                    <div id="activeTripArea" style="display:none;">
                        <div style="background:rgba(251, 188, 4, 0.1); padding:15px; border-radius:15px; border:1px solid var(--amber);">
                            <p style="margin:0; color:var(--amber); font-weight:bold;">ACTIVE TRIP</p>
                            <h3 id="activeStudentName" style="margin:5px 0;">-</h3>
                            <p id="activeTripRoute" style="font-size:0.85rem; margin:0;"></p>
                        </div>
                        
                        <div id="chatBox"></div>
                        <div style="display:flex; gap:5px;">
                            <input type="text" id="chatInput" placeholder="Message student...">
                            <button onclick="sendChat()" style="background:var(--blue); color:white; border:none; padding:0 15px; border-radius:10px;">Send</button>
                        </div>
                        <button class="btn" style="background:var(--green); color:white; margin-top:15px;" onclick="finishTrip()">FINISH TRIP</button>
                    </div>

                    <button class="btn" id="mainBtn" style="margin-top:15px;" onclick="toggleStatus()">GO ONLINE</button>
                </div>

                <div id="sectionBoard" style="display:none;">
                    <h4 style="color:var(--green);">My Schedule</h4>
                    <div id="myScheduleList"></div>
                    <hr style="border:0; border-top:1px solid #334155; margin:15px 0;">
                    <h4 style="color:var(--amber);">Public Board</h4>
                    <div id="publicBookingList"></div>
                </div>

                <button onclick="logout()" style="background:none; border:none; color:var(--red); width:100%; margin-top:20px; cursor:pointer; font-size:0.8rem;">Logout</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCU3QzjiDpL4U3825XtERth6PFlJ1tsZtg",
            databaseURL: "https://carpool-uitm-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "carpool-uitm"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentDriver = JSON.parse(localStorage.getItem('drv_active'));

        // LOGIN
        async function login() {
            const user = document.getElementById('uName').value.trim();
            const pass = document.getElementById('uPass').value.trim();
            const snap = await db.ref('drivers').get();
            const all = snap.val();
            let found = null;
            for(let id in all) {
                if(all[id].username == user && all[id].password == pass) { found = {...all[id], id: id}; break; }
            }
            if(found) { localStorage.setItem('drv_active', JSON.stringify(found)); location.reload(); }
            else alert("Wrong credentials!");
        }

        if(currentDriver) {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('dashArea').style.display = 'block';
            
            // Sync Driver Data
            db.ref('drivers/' + currentDriver.id).on('value', snap => {
                const d = snap.val();
                if(!d) return;
                currentDriver = {...d, id: currentDriver.id};
                document.getElementById('dispName').innerText = d.name;
                document.getElementById('dispCar').innerText = `${d.car} [${d.plate}]`;
                
                const badge = document.getElementById('statusBadge');
                badge.innerText = d.status;
                badge.className = "status-" + d.status;

                updateDashboardUI(d.status);
            });

            // Sync Open Requests (For Instant Ride)
            db.ref('open_requests').on('value', snap => {
                let html = "";
                snap.forEach(child => {
                    const r = child.val();
                    if(r.status === 'SEARCHING') {
                        html += `
                        <div class="request-card">
                            <span class="pax-tag">${r.pax} PAX</span>
                            <b>${r.student_name}</b>
                            <p style="margin:5px 0; font-size:0.8rem;">📍 ${r.pickup} <br> 🏁 ${r.destination}</p>
                            <button class="btn" style="padding:8px; font-size:0.8rem; background:var(--blue); color:white;" onclick="acceptInstant('${child.key}')">ACCEPT</button>
                        </div>`;
                    }
                });
                document.getElementById('requestList').innerHTML = html || "No requests found.";
            });
        }

        function updateDashboardUI(status) {
            const mainBtn = document.getElementById('mainBtn');
            const reqList = document.getElementById('availableRequests');
            const tripArea = document.getElementById('activeTripArea');

            if(status === 'BOOKED') {
                mainBtn.style.display = 'none';
                reqList.style.display = 'none';
                tripArea.style.display = 'block';
                loadActiveTripData();
                loadChats(currentDriver.id);
            } else {
                mainBtn.style.display = 'block';
                mainBtn.innerText = status === 'ON' ? "GO OFFLINE" : "GO ONLINE";
                mainBtn.style.background = status === 'ON' ? "var(--red)" : "white";
                mainBtn.style.color = status === 'ON' ? "white" : "black";
                reqList.style.display = status === 'ON' ? 'block' : 'none';
                tripArea.style.display = 'none';
            }
        }

        async function acceptInstant(reqId) {
            const snap = await db.ref('open_requests/' + reqId).get();
            const req = snap.val();
            if(!req || req.status !== 'SEARCHING') return alert("Taken by another driver!");

            // Update request to ACCEPTED
            await db.ref('open_requests/' + reqId).update({
                status: 'ACCEPTED',
                driver_id: currentDriver.id,
                driver_name: currentDriver.name,
                driver_car: currentDriver.car,
                driver_plate: currentDriver.plate
            });

            // Update Driver Status to BOOKED
            await db.ref('drivers/' + currentDriver.id).update({ 
                status: 'BOOKED',
                current_trip_id: reqId 
            });
        }

        async function finishTrip() {
            if(!confirm("Complete this trip? Student will be asked for rating.")) { return; }
            const tripId = currentDriver.current_trip_id;
            await db.ref('drivers/' + currentDriver.id).update({ status: 'ON', current_trip_id: null });
            await db.ref('open_requests/' + tripId).remove();
            await db.ref('chats/' + currentDriver.id).remove();
        }

        async function toggleStatus() {
            let next = currentDriver.status === 'ON' ? 'OFF' : 'ON';
            await db.ref('drivers/' + currentDriver.id).update({ status: next });
        }

        async function loadActiveTripData() {
            const tripId = currentDriver.current_trip_id;
            if(!tripId) return;
            const snap = await db.ref('open_requests/' + tripId).get();
            if(snap.exists()) {
                const t = snap.val();
                document.getElementById('activeStudentName').innerText = t.student_name;
                document.getElementById('activeTripRoute').innerText = `${t.pickup} ➔ ${t.destination} (${t.pax} Pax)`;
            }
        }

        function loadChats(id) {
            db.ref('chats/' + id).on('value', snap => {
                let html = "";
                snap.forEach(c => {
                    const m = c.val();
                    html += `<div class="msg ${m.sender === 'driver' ? 'me' : 'them'}">${m.text}</div>`;
                });
                const box = document.getElementById('chatBox');
                box.innerHTML = html;
                box.scrollTop = box.scrollHeight;
            });
        }

        async function sendChat() {
            const input = document.getElementById('chatInput');
            if(!input.value.trim()) return;
            await db.ref('chats/' + currentDriver.id).push({ sender: 'driver', text: input.value });
            input.value = "";
        }

        function showTab(t) {
            document.getElementById('sectionLive').style.display = t === 'live' ? 'block' : 'none';
            document.getElementById('sectionBoard').style.display = t === 'board' ? 'block' : 'none';
            document.getElementById('btnLive').className = t === 'live' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('btnBoard').className = t === 'board' ? 'tab-btn active' : 'tab-btn';
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
