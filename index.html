<div class="container">
    <h2>Driver Dashboard</h2>
    <div class="tab-bar">
        <div class="tab active" id="tabLive" onclick="switchDriverTab('live')">Live Jobs</div>
        <div class="tab" id="tabBoard" onclick="switchDriverTab('board')">Booking Board</div>
    </div>

    <div id="liveSection">
        </div>

    <div id="boardSection" style="display:none;">
        <h4>Available Bookings</h4>
        <div id="availableBookings"></div>
    </div>
</div>

<script>
    // ... Firebase Init ...

    function switchDriverTab(t) {
        document.getElementById('liveSection').style.display = t === 'live' ? 'block' : 'none';
        document.getElementById('boardSection').style.display = t === 'board' ? 'block' : 'none';
    }

    // Load all PENDING bookings for all drivers to see
    db.ref('bookings').on('value', (snap) => {
        let html = "";
        snap.forEach(child => {
            const b = child.val();
            const bId = child.key;
            if(b.status === "PENDING") {
                html += `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <b>${b.student_name}</b>
                        <span style="color:var(--amber)">${b.date}</span>
                    </div>
                    <p style="font-size:0.9rem; color:var(--slate)">Time: ${b.time} | To: ${b.dest}</p>
                    <button class="btn" onclick="acceptBooking('${bId}')">Accept Job</button>
                </div>`;
            }
        });
        document.getElementById('availableBookings').innerHTML = html || "No pending bookings.";
    });

    async function acceptBooking(id) {
        if(confirm("Accept this booking?")) {
            // Update the booking status and assign this driver (shauqi)
            await db.ref('bookings/' + id).update({
                status: "ACCEPTED",
                driver_name: "shauqi", // Get this from driver login/profile
                driver_id: "D001"
            });
            alert("Booking accepted! It will show in your schedule.");
        }
    }
</script>
