<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard | SeGo Driver</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; --green: #22c55e; --red: #ef4444; --amber: #f59e0b; }
        body { font-family: sans-serif; background: var(--bg); color: white; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .container { width: 100%; max-width: 400px; margin-top: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #statusBadge { padding: 8px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 20px; }
        .status-ON { background: var(--green); color: white; }
        .status-OFF { background: var(--red); color: white; }
        .status-BOOKED { background: var(--amber); color: black; }
        
        #chatBox { background: #0f172a; height: 160px; overflow-y: auto; padding: 10px; border-radius: 10px; margin: 15px 0; border: 1px solid #334155; display: flex; flex-direction: column; gap: 5px; }
        .msg { padding: 8px; border-radius: 8px; max-width: 80%; font-size: 0.85rem; }
        .me { align-self: flex-end; background: var(--blue); }
        .them { align-self: flex-start; background: #334155; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginArea" class="card">
            <h2>Driver Login</h2>
            <input type="text" id="uName" placeholder="Username">
            <input type="password" id="uPass" placeholder="Password">
            <button class="btn" style="background: var(--blue); color:white;" onclick="login()">Login</button>
        </div>

        <div id="dashArea" class="card" style="display:none;">
            <div id="statusBadge">OFFLINE</div>
            <h1 id="dispName" style="margin:0;">-</h1>
            <p id="dispCar" style="color:#94a3b8; margin-bottom:20px;">-</p>

            <div id="chatSection" style="display:none; border-top: 1px solid #334155; padding-top: 15px;">
                <label style="color:var(--amber); font-weight:bold; font-size:0.8rem;">LIVE CHAT WITH STUDENT:</label>
                <div id="chatBox"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="chatInput" placeholder="Type a message...">
                    <button onclick="sendChat()" style="background:var(--blue); color:white; border:none; padding:0 15px; border-radius:8px;">Send</button>
                </div>
            </div>

            <button class="btn" id="mainBtn" onclick="toggleStatus()" style="margin-top: 20px;">GO ONLINE</button>
            <button onclick="logout()" style="background:none; border:none; color:var(--red); width:100%; margin-top:20px; cursor:pointer; text-decoration:underline;">Logout</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCU3QzjiDpL4U3825XtERth6PFlJ1tsZtg",
            databaseURL: "https://carpool-uitm-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "carpool-uitm"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentDriver = JSON.parse(localStorage.getItem('drv_active'));

        async function login() {
            const user = document.getElementById('uName').value.trim();
            const pass = document.getElementById('uPass').value.trim();
            const snap = await db.ref('drivers').get();
            const all = snap.val();
            let found = null;
            for(let id in all) {
                if(String(all[id].username) === user && String(all[id].password) === pass) {
                    found = all[id]; break;
                }
            }
            if(found) { localStorage.setItem('drv_active', JSON.stringify(found)); location.reload(); }
            else { alert("Invalid Credentials!"); }
        }

        if(currentDriver) {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('dashArea').style.display = 'block';
            
            db.ref('drivers/' + currentDriver.id).on('value', (snap) => {
                const d = snap.val();
                if(!d) return;
                currentDriver = d;
                document.getElementById('dispName').innerText = d.name;
                document.getElementById('dispCar').innerText = d.car + " [" + d.plate + "]";
                const badge = document.getElementById('statusBadge');
                badge.innerText = d.status;
                badge.className = "status-" + d.status;
                
                const btn = document.getElementById('mainBtn');
                const chatArea = document.getElementById('chatSection');
                
                if(d.status === 'BOOKED') {
                    btn.innerText = "COMPLETE TRIP (CLEAR CHAT)";
                    btn.style.background = "var(--green)";
                    btn.style.color = "white";
                    chatArea.style.display = 'block';
                    loadChats(d.id);
                } else {
                    btn.innerText = d.status === 'ON' ? "GO OFFLINE" : "GO ONLINE";
                    btn.style.background = d.status === 'ON' ? "var(--red)" : "white";
                    btn.style.color = d.status === 'ON' ? "white" : "black";
                    chatArea.style.display = 'none';
                }
            });
        }

        async function toggleStatus() {
            if (currentDriver.status === 'BOOKED') {
                await completeTrip();
                return;
            }
            let next = currentDriver.status === 'ON' ? 'OFF' : 'ON';
            await db.ref('drivers/' + currentDriver.id).update({ status: next });
        }

        async function completeTrip() {
            if(confirm("Finish trip and clear chat?")) {
                await db.ref('chats/' + currentDriver.id).remove();
                await db.ref('drivers/' + currentDriver.id).update({ status: 'ON' });
                alert("Trip Completed!");
            }
        }

        async function sendChat() {
            const input = document.getElementById('chatInput');
            if(!input.value.trim()) return;
            await db.ref('chats/' + currentDriver.id).push({ sender: 'driver', text: input.value, time: Date.now() });
            input.value = "";
        }

        function loadChats(id) {
            db.ref('chats/' + id).on('value', (snap) => {
                const box = document.getElementById('chatBox');
                if(!box) return;
                let html = "";
                snap.forEach(c => {
                    const m = c.val();
                    html += `<div class="msg ${m.sender === 'driver' ? 'me' : 'them'}">${m.text}</div>`;
                });
                box.innerHTML = html;
                box.scrollTop = box.scrollHeight;
            });
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
