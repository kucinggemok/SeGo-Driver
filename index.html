<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard | SeGo Driver</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; --green: #22c55e; --red: #ef4444; --amber: #f59e0b; --slate: #94a3b8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; display: flex; justify-content: center; margin: 0; }
        .container { width: 100%; max-width: 400px; margin-top: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        
        #statusBadge { padding: 8px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }
        .status-ON { background: var(--green); color: white; }
        .status-OFF { background: var(--red); color: white; }
        .status-BUSY { background: var(--amber); color: black; }
        
        #chatBox { background: #0f172a; height: 200px; overflow-y: auto; padding: 10px; border-radius: 10px; margin: 15px 0; border: 1px solid #334155; display: flex; flex-direction: column; gap: 5px; }
        .msg { padding: 8px; border-radius: 8px; max-width: 80%; font-size: 0.85rem; }
        .me { align-self: flex-end; background: var(--blue); color: white; }
        .them { align-self: flex-start; background: #334155; color: white; }

        .tab-bar { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: #1e293b; border: 1px solid #334155; color: white; cursor: pointer; border-radius: 10px; font-size: 0.8rem; }
        .tab-btn.active { background: var(--blue); border-color: var(--blue); font-weight: bold; }
        
        .booking-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-top: 10px; border-left: 4px solid var(--amber); margin-bottom: 10px; }
        .schedule-card { background: rgba(34, 197, 94, 0.1); padding: 15px; border-radius: 12px; margin-top: 10px; border-left: 4px solid var(--green); margin-bottom: 10px; }
        
        #bookingChatOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:100; display:none; flex-direction:column; padding:20px; box-sizing:border-box; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginArea" class="card">
            <h2 style="text-align:center;">SeGo Driver</h2>
            <input type="text" id="uName" placeholder="Username">
            <input type="password" id="uPass" placeholder="Password">
            <button class="btn" style="background: var(--blue); color:white;" onclick="login()">Login</button>
        </div>

        <div id="dashArea" style="display:none;">
            <div class="card">
                <div id="statusBadge">OFFLINE</div>
                <h1 id="dispName" style="margin:0; font-size: 1.5rem;">-</h1>
                <p id="dispCar" style="color:var(--slate); margin-bottom:20px;">-</p>

                <div class="tab-bar">
                    <button class="tab-btn active" id="btnLive" onclick="showTab('live')">Live Shift</button>
                    <button class="tab-btn" id="btnBoard" onclick="showTab('board')">Booking Board</button>
                </div>

                <div id="sectionLive">
                    <div id="activeRideSection" style="display:none; border-top: 1px solid #334155; padding-top: 15px;">
                        <div id="rideInfo" style="margin-bottom: 10px; background: rgba(255,158,11,0.1); padding: 10px; border-radius: 10px;"></div>
                        <label style="color:var(--amber); font-weight:bold; font-size:0.75rem;">CHAT WITH STUDENT:</label>
                        <div id="chatBox"></div>
                        <div style="display:flex; gap:5px; margin-bottom: 15px;">
                            <input type="text" id="chatInput" placeholder="Type message...">
                            <button onclick="sendChat('instant')" style="background:var(--blue); color:white; border:none; padding:0 15px; border-radius:8px;">Send</button>
                        </div>
                    </div>

                    <div id="instantRequestsArea">
                        <h4 style="margin:0 0 10px 0; color:var(--blue);">📍 Nearby Requests</h4>
                        <div id="instantList" style="font-size:0.85rem; margin-bottom:15px;">Go online to see requests...</div>
                    </div>

                    <button class="btn" id="mainBtn" onclick="toggleStatus()">GO ONLINE</button>
                </div>

                <div id="sectionBoard" style="display:none;">
                    <h4 style="margin-bottom:5px; color:var(--green);">✅ My Schedule</h4>
                    <div id="myScheduleList" style="font-size:0.9rem;">No confirmed trips.</div>
                    <hr style="border:0; border-top:1px solid #334155; margin:20px 0;">
                    <h4 style="margin-bottom:5px; color:var(--amber);">🔔 Available Jobs</h4>
                    <div id="bookingList" style="font-size:0.85rem;">Searching...</div>
                </div>

                <button onclick="logout()" style="background:none; border:none; color:var(--red); width:100%; margin-top:25px; cursor:pointer; text-decoration:underline; font-size: 0.8rem;">Logout</button>
            </div>
        </div>
    </div>

    <div id="bookingChatOverlay">
        <h3 id="bookChatHeader" style="margin-top:0;">Chat</h3>
        <div id="bookingChatBox" style="flex:1; background:#0f172a; border-radius:10px; padding:10px; overflow-y:auto; border:1px solid #334155; margin-bottom:10px; display:flex; flex-direction:column; gap:5px;"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="bookChatInput" style="margin:0;" placeholder="Type message...">
            <button class="btn" style="width:80px; margin:0;" onclick="sendChat('booking')">Send</button>
        </div>
        <button class="btn" style="background:var(--red); margin-top:10px;" onclick="closeBookingChat()">Back to Dashboard</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCU3QzjiDpL4U3825XtERth6PFlJ1tsZtg", databaseURL: "https://carpool-uitm-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "carpool-uitm" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentDriver = JSON.parse(localStorage.getItem('drv_active'));
        let activeInstantId = null; 
        let activeBookingId = null;

        async function login() {
            const user = document.getElementById('uName').value.trim();
            const pass = document.getElementById('uPass').value.trim();
            if(!user || !pass) return alert("Fill all fields");
            const snap = await db.ref('drivers').get();
            const all = snap.val();
            let found = null;
            for(let id in all) {
                if(String(all[id].username) === user && String(all[id].password) === pass) {
                    found = {...all[id], id: id}; break; 
                }
            }
            if(found) { localStorage.setItem('drv_active', JSON.stringify(found)); location.reload(); } 
            else { alert("Invalid Credentials!"); }
        }

        if(currentDriver) {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('dashArea').style.display = 'block';
            
            // 1. Monitor Driver Personal Info & Status
            db.ref('drivers/' + currentDriver.id).on('value', (snap) => {
                const d = snap.val();
                if(!d) return;
                currentDriver = {...d, id: currentDriver.id}; // Sync status ke global variable
                
                document.getElementById('dispName').innerText = d.name;
                document.getElementById('dispCar').innerText = d.car + " [" + d.plate + "]";
                
                const badge = document.getElementById('statusBadge');
                badge.innerText = d.status;
                badge.className = "status-" + d.status;
                
                const btn = document.getElementById('mainBtn');
                if(d.status === 'BUSY') {
                    btn.innerText = "FINISH TRIP";
                    btn.style.background = "var(--green)";
                    btn.style.color = "white";
                } else {
                    btn.innerText = d.status === 'ON' ? "GO OFFLINE" : "GO ONLINE";
                    btn.style.background = d.status === 'ON' ? "var(--red)" : "white";
                    btn.style.color = d.status === 'ON' ? "white" : "black";
                }
            });

            // 2. Monitor Instant Requests (With Always-Live Logic)
            db.ref('open_requests').on('value', (snap) => {
                renderInstantRequests(snap);
            });

            // 3. Monitor Pre-Bookings
            db.ref('bookings').on('value', (snap) => {
                let boardHtml = ""; let scheduleHtml = "";
                snap.forEach(child => {
                    const b = child.val();
                    if(b.status === "PENDING") {
                        boardHtml += `<div class="booking-card"><b>${b.student_name}</b><br>📅 ${b.date} | ⏰ ${b.time}<br>📍 To: ${b.dest}<br><button onclick="acceptBooking('${child.key}')" class="btn" style="padding:8px; background:var(--amber); font-size:0.8rem;">ACCEPT JOB</button></div>`;
                    }
                    if(b.status === "ACCEPTED" && b.driver_id === currentDriver.id) {
                        scheduleHtml += `<div class="schedule-card">
                            <b>👤 ${b.student_name}</b><br>📅 ${b.date} | ⏰ ${b.time}<br>📍 To: ${b.dest}<br>
                            <button onclick="openBookingChat('${child.key}', '${b.student_name}')" class="btn" style="background:var(--blue); padding:8px; font-size:0.8rem;">💬 CHAT STUDENT</button>
                            <button onclick="cancelBooking('${child.key}')" style="margin-top:8px; color:var(--red); background:none; border:none; text-decoration:underline; font-size:0.7rem; cursor:pointer; width:100%;">Cancel Trip</button>
                        </div>`;
                    }
                });
                document.getElementById('bookingList').innerHTML = boardHtml || "No pending bookings.";
                document.getElementById('myScheduleList').innerHTML = scheduleHtml || "No confirmed trips.";
            });
        }

        // Separate function for rendering to allow forced refresh
        function renderInstantRequests(snap) {
            let instantHtml = "";
            let myTripFound = false;
            
            snap.forEach(child => {
                const req = child.val();
                // Check status ON directly from currentDriver variable
                if(req.status === 'SEARCHING' && currentDriver.status === 'ON') {
                    instantHtml += `
                    <div class="booking-card" style="border-left-color: var(--blue);">
                        <b>👤 ${req.student_name} (${req.pax} Pax)</b><br>
                        📍 From: ${req.pickup}<br>
                        🎯 To: ${req.destination}<br>
                        <button onclick="acceptInstant('${child.key}')" class="btn" style="padding:10px; background:var(--blue); font-size:0.85rem;">ACCEPT NOW</button>
                    </div>`;
                }
                if(req.driver_id === currentDriver.id && (req.status === 'ACCEPTED' || req.status === 'COMPLETED')) {
                    myTripFound = true;
                    activeInstantId = child.key;
                    showActiveRide(req);
                }
            });

            document.getElementById('instantList').innerHTML = (currentDriver.status === 'ON') ? (instantHtml || "Waiting for requests...") : "Go online to see requests.";
            
            if(!myTripFound && currentDriver.status === 'BUSY') {
                resetToMenu();
            } else if (!myTripFound) {
                document.getElementById('activeRideSection').style.display = 'none';
                document.getElementById('instantRequestsArea').style.display = 'block';
                activeInstantId = null;
            }
        }

        async function toggleStatus() {
            if (currentDriver.status === 'BUSY') { completeTrip(); return; }
            
            let next = currentDriver.status === 'ON' ? 'OFF' : 'ON';
            
            // Update Database
            await db.ref('drivers/' + currentDriver.id).update({ status: next });
            
            // CRITICAL: Update local status immediately so logic doesn't wait for Firebase sync
            currentDriver.status = next;
            
            // FORCE RE-RENDER: Ambil data snapshot terbaru dan lukis terus
            const snap = await db.ref('open_requests').get();
            renderInstantRequests(snap);
        }

        function resetToMenu() {
            db.ref('drivers/' + currentDriver.id).update({ status: 'ON' });
            currentDriver.status = 'ON';
            document.getElementById('activeRideSection').style.display = 'none';
            document.getElementById('instantRequestsArea').style.display = 'block';
            activeInstantId = null;
        }

        async function acceptInstant(id) {
            await db.ref('open_requests/' + id).update({
                status: 'ACCEPTED',
                driver_id: currentDriver.id,
                driver_name: currentDriver.name,
                driver_car: currentDriver.car,
                driver_plate: currentDriver.plate
            });
            await db.ref('drivers/' + currentDriver.id).update({ status: 'BUSY' });
            currentDriver.status = 'BUSY';
        }

        function showActiveRide(data) {
            document.getElementById('activeRideSection').style.display = 'block';
            document.getElementById('instantRequestsArea').style.display = 'none';
            document.getElementById('rideInfo').innerHTML = `<b>Current Trip: ${data.student_name}</b><br><small>${data.pickup} ➔ ${data.destination}</small>`;
            loadChats(activeInstantId, 'chatBox');
        }

        async function completeTrip() {
            if(confirm("Finish trip? Student will be asked to rate.")) {
                await db.ref('open_requests/' + activeInstantId).update({ status: 'COMPLETED' });
            }
        }

        async function sendChat(type) {
            const input = document.getElementById(type === 'instant' ? 'chatInput' : 'bookChatInput');
            const targetId = type === 'instant' ? activeInstantId : activeBookingId;
            if(!input.value.trim() || !targetId) return;
            
            await db.ref('chats/' + targetId).push({
                sender: 'driver',
                text: input.value,
                time: Date.now()
            });
            input.value = "";
        }

        function loadChats(id, elementId) {
            db.ref('chats/' + id).on('value', (snap) => {
                const box = document.getElementById(elementId);
                let html = "";
                snap.forEach(c => {
                    const m = c.val();
                    html += `<div class="msg ${m.sender === 'driver' ? 'me' : 'them'}">${m.text}</div>`;
                });
                box.innerHTML = html; box.scrollTop = box.scrollHeight;
            });
        }

        function openBookingChat(id, name) {
            activeBookingId = id;
            document.getElementById('bookChatHeader').innerText = "Chat with " + name;
            document.getElementById('bookingChatOverlay').style.display = 'flex';
            loadChats(id, 'bookingChatBox');
        }

        function closeBookingChat() {
            document.getElementById('bookingChatOverlay').style.display = 'none';
            if(activeBookingId) db.ref('chats/' + activeBookingId).off();
            activeBookingId = null;
        }

        async function acceptBooking(key) {
            if(confirm("Accept this booking?")) {
                await db.ref('bookings/' + key).update({ 
                    status: 'ACCEPTED', 
                    driver_name: currentDriver.name, 
                    driver_id: currentDriver.id,
                    driver_plate: currentDriver.plate,
                    driver_car: currentDriver.car
                });
            }
        }

        async function cancelBooking(key) {
            if(confirm("Cancel this?")) {
                await db.ref('bookings/' + key).update({ status: 'PENDING', driver_name: null, driver_id: null });
            }
        }

        function showTab(t) {
            document.getElementById('sectionLive').style.display = t === 'live' ? 'block' : 'none';
            document.getElementById('sectionBoard').style.display = t === 'board' ? 'block' : 'none';
            document.getElementById('btnLive').className = t === 'live' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('btnBoard').className = t === 'board' ? 'tab-btn active' : 'tab-btn';
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
